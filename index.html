<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Testes | Manutenção</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-charging-station"></i>
                <div>
                    <h1>Controle de Carga</h1>
                    <span id="stats">Carregando equipamentos...</span>
                </div>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Ex: GE-58...">
            </div>
        </div>
    </header>

    <main id="equipmentsGrid" class="grid-container">
        <!-- Cards gerados via JS -->
    </main>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-info">
                    <h2 id="modalTitle">Equipamento</h2>
                    <p id="modalSubtitle">Histórico de Testes</p>
                </div>
                <button id="closeModal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Tabela inserida via JS -->
            </div>
        </div>
    </div>

    <!-- BIBLIOTECA PAPAPARSE - ESSA LINHA É O QUE RESOLVE O ERRO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- SEU SCRIPT DEVE VIR DEPOIS -->
    <script src="script.js"></script>
</body>
</html>
